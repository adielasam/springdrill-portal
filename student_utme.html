<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - UTME Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; --utme-green: #27ae60;}
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; box-shadow: 4px 0 15px rgba(0,0,0,0.1);}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; }
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .setup-card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden;}
        .setup-header { background: var(--utme-green); color: white; padding: 15px 20px; font-weight: bold; font-size: 1.1rem;}
        
        .subject-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin: 20px 0 40px 0; }
        .form-check-label { font-weight: 600; cursor: pointer; color: var(--text-color);}
        
        .config-box { border: 1px solid var(--utme-green); border-radius: 8px; overflow: hidden; height: 100%;}
        .config-header { background: var(--utme-green); color: white; padding: 10px 15px; font-weight: bold; font-size: 0.9rem;}
        .config-body { padding: 20px; background: var(--input-bg);}

        .profile-circle { width: 120px; height: 120px; background: var(--utme-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 4rem; margin: 0 auto 20px auto; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);}
        .name-plate { background: var(--input-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 30px; font-weight: bold; text-align: center; margin-bottom: 20px;}
        .btn-start { background: #1976d2; color: white; font-weight: bold; border-radius: 30px; padding: 12px 0; width: 100%; transition: 0.3s; border: none;}
        .btn-start:hover { background: #1565c0; transform: translateY(-2px);}

    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a href="student_dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            
            <a href="student_utme.html" class="nav-link active fw-bold text-success"><i class="fas fa-robot"></i> AI JAMB Simulator</a>
            
            <a href="student_utme_hub.html" class="nav-link"><i class="fas fa-university text-warning"></i> Real UTME Hub</a>
            <a href="student_results.html" class="nav-link"><i class="fas fa-chart-line"></i> My Results</a>
            <a href="student_messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Secure Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar border-start border-4 border-success">
            <div class="fw-bold text-muted"><i class="fas fa-desktop me-2"></i> Test Preparation Center</div>
        </div>

        <div class="setup-card">
            <div class="setup-header">Practice For UTME (AI Mode)</div>
            
            <div class="p-4">
                <div class="text-center text-muted fw-bold mb-3 small">Select One or More Subjects (Max 4 for JAMB)</div>
                
                <div class="subject-row">
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="English" id="sub_eng" checked><label class="form-check-label" for="sub_eng">English</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Accounts" id="sub_acc"><label class="form-check-label" for="sub_acc">Accounts</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Agriculture" id="sub_agr"><label class="form-check-label" for="sub_agr">Agriculture</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Arabic" id="sub_ara"><label class="form-check-label" for="sub_ara">Arabic</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Biology" id="sub_bio"><label class="form-check-label" for="sub_bio">Biology</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Chemistry" id="sub_che"><label class="form-check-label" for="sub_che">Chemistry</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Commerce" id="sub_com"><label class="form-check-label" for="sub_com">Commerce</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Computer Studies" id="sub_comp"><label class="form-check-label" for="sub_comp">Computer Studies</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="CRK" id="sub_crk"><label class="form-check-label" for="sub_crk">CRK</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Economics" id="sub_eco"><label class="form-check-label" for="sub_eco">Economics</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Fine Art" id="sub_fart"><label class="form-check-label" for="sub_fart">Fine Art</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="French" id="sub_fre"><label class="form-check-label" for="sub_fre">French</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Geography" id="sub_geo"><label class="form-check-label" for="sub_geo">Geography</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Government" id="sub_gov"><label class="form-check-label" for="sub_gov">Government</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Hausa" id="sub_hau"><label class="form-check-label" for="sub_hau">Hausa</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="History" id="sub_his"><label class="form-check-label" for="sub_his">History</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Home Economics" id="sub_home"><label class="form-check-label" for="sub_home">Home Economics</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Igbo" id="sub_igb"><label class="form-check-label" for="sub_igb">Igbo</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="IRK" id="sub_irk"><label class="form-check-label" for="sub_irk">IRK</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Literature" id="sub_lit"><label class="form-check-label" for="sub_lit">Literature</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Literature Textbooks" id="sub_lit_text"><label class="form-check-label" for="sub_lit_text">Literature Textbooks</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Mathematics" id="sub_mat" checked><label class="form-check-label" for="sub_mat">Mathematics</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Music" id="sub_mus"><label class="form-check-label" for="sub_mus">Music</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="PHE" id="sub_phe"><label class="form-check-label" for="sub_phe">PHE</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Physics" id="sub_phy"><label class="form-check-label" for="sub_phy">Physics</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="The Lekki Headmaster" id="sub_lekki"><label class="form-check-label" for="sub_lekki">The Lekki Headmaster</label></div>
                    <div class="form-check"><input class="form-check-input sub-checkbox" type="checkbox" value="Yoruba" id="sub_yor"><label class="form-check-label" for="sub_yor">Yoruba</label></div>
                </div>

                <div class="row align-items-center g-4">
                    <div class="col-md-4">
                        <div class="config-box">
                            <div class="config-header"><i class="fas fa-chevron-down me-2"></i> Configuration</div>
                            <div class="config-body">
                                <label class="form-label text-muted fw-bold small">Number of questions per subject</label>
                                <select id="qCount" class="form-select fw-bold">
                                    <option value="10">10 Questions</option>
                                    <option value="20">20 Questions</option>
                                    <option value="30">30 Questions</option>
                                    <option value="40">40 Questions</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4 text-center px-4">
                        <div class="profile-circle"><i class="fas fa-user"></i></div>
                        <div class="name-plate text-uppercase" id="studentNameDisplay">Loading...</div>
                        <button class="btn-start" onclick="startAIExam()"><i class="fas fa-play-circle me-2"></i> Get Started</button>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label text-muted fw-bold small">Total Time</label>
                        <select id="examTime" class="form-select fw-bold border-0 bg-light shadow-sm">
                            <option value="7200">02:00:00</option>
                            <option value="5400">01:30:00</option>
                            <option value="3600">01:00:00</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';

            try {
                const { data: profile } = await supabase.from('users').select('name').eq('id', session.user.id).single();
                if (profile) document.getElementById('studentNameDisplay').innerText = profile.name;
            } catch(e) { console.error(e); }
        }

        window.startAIExam = () => {
            const checkboxes = document.querySelectorAll('.sub-checkbox');
            let selected = [];
            checkboxes.forEach(cb => { if(cb.checked) selected.push(cb.value); });

            if (selected.length === 0) return alert("Please select at least one subject.");
            if (selected.length > 4) return alert("Maximum of 4 subjects allowed for JAMB.");

            localStorage.setItem('UTME_SUBJECTS', JSON.stringify(selected));
            localStorage.setItem('UTME_QUESTION_COUNT', document.getElementById('qCount').value);
            localStorage.setItem('UTME_EXAM_TIME', document.getElementById('examTime').value);

            window.location.href = 'student_utme_exam.html'; 
        };

        document.addEventListener('DOMContentLoaded', init);
        document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
