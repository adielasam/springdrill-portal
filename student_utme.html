<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - UTME Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; }
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; transition: 0.3s; }
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; transition: 0.3s; }
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; transition: 0.3s; display: flex; align-items: center; }
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}
        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; transition: 0.3s; }
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #27ae60;}
        .dark-toggle-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .utme-container { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .utme-header { background-color: #27ae60; color: white; padding: 15px 25px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem;}
        
        /* Updated Grid for Many Subjects */
        .subject-grid { padding: 20px 25px; border-bottom: 2px solid var(--border-color); display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; background: var(--input-bg); max-height: 300px; overflow-y: auto;}
        .subject-item { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; font-size: 0.95rem;}
        .subject-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #27ae60;}
        
        .config-area { padding: 30px 25px; display: flex; gap: 30px; flex-wrap: wrap;}
        .config-col-left, .config-col-right { flex: 1; min-width: 250px; }
        .subject-accordion-header { background: #27ae60; color: white; padding: 10px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 15px;}
        .form-label { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px; display: block;}
        .form-select, .form-control { border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-color); border-radius: 4px; padding: 8px 12px; width: 100%; transition: 0.3s;}
        .config-col-center { flex: 1; min-width: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px dashed var(--border-color); border-right: 1px dashed var(--border-color); padding: 0 20px;}
        .utme-avatar { width: 150px; height: 150px; border-radius: 50%; background-color: #27ae60; display: flex; justify-content: center; align-items: center; color: white; font-size: 5rem; margin-bottom: 20px;}
        .btn-start { background-color: #1976d2; color: white; border: none; width: 100%; padding: 12px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; transition: 0.3s; margin-top: 15px;}
        .fieldset-box { border: 1px solid var(--border-color); border-radius: 4px; padding: 15px; margin-bottom: 20px; position: relative;}
        .fieldset-legend { position: absolute; top: -10px; left: 10px; background: var(--card-bg); padding: 0 10px; font-size: 0.85rem; font-weight: bold; color: var(--text-muted);}
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loadingOverlay"><i class="fas fa-spinner fa-spin fa-3x text-success mb-3"></i><h4 class="fw-bold" style="color: var(--text-muted);">Initializing Simulator...</h4></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex justify-content-between align-items-center px-3">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a href="student_dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="student_utme.html" class="nav-link active fw-bold" style="color: #2ecc71;"><i class="fas fa-university"></i> UTME Simulator</a>
            <a href="student_results.html" class="nav-link"><i class="fas fa-chart-bar text-warning"></i> My Results</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="fw-bold d-none d-md-block" style="color: var(--text-muted);"><i class="fas fa-university me-2 text-success"></i> Test Preparation Center</div>
            <button class="dark-toggle-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>

        <div class="utme-container">
            <div class="utme-header"><span>Practice For UTME</span></div>

            <div class="p-2 text-center border-bottom fw-bold" style="background: var(--card-bg); color: var(--text-muted);">
                Select One or More Subjects (Max 4 for JAMB)
            </div>
            
            <div class="subject-grid">
                <label class="subject-item"><input type="checkbox" checked value="English Language"> English Language</label>
                <label class="subject-item"><input type="checkbox" value="Mathematics"> Mathematics</label>
                <label class="subject-item"><input type="checkbox" value="Physics"> Physics</label>
                <label class="subject-item"><input type="checkbox" value="Chemistry"> Chemistry</label>
                <label class="subject-item"><input type="checkbox" value="Biology"> Biology</label>
                <label class="subject-item"><input type="checkbox" value="Agricultural Science"> Agricultural Science</label>
                <label class="subject-item"><input type="checkbox" value="Economics"> Economics</label>
                <label class="subject-item"><input type="checkbox" value="Government"> Government</label>
                <label class="subject-item"><input type="checkbox" value="Literature in English"> Literature in English</label>
                <label class="subject-item"><input type="checkbox" value="Christian Religious Studies"> CRS</label>
                <label class="subject-item"><input type="checkbox" value="Islamic Studies"> Islamic Studies</label>
                <label class="subject-item"><input type="checkbox" value="Commerce"> Commerce</label>
                <label class="subject-item"><input type="checkbox" value="Geography"> Geography</label>
                <label class="subject-item"><input type="checkbox" value="History"> History</label>
                <label class="subject-item"><input type="checkbox" value="Principles of Accounts"> Principles of Accounts</label>
                <label class="subject-item"><input type="checkbox" value="French"> French</label>
                <label class="subject-item"><input type="checkbox" value="Hausa"> Hausa</label>
                <label class="subject-item"><input type="checkbox" value="Igbo"> Igbo</label>
                <label class="subject-item"><input type="checkbox" value="Yoruba"> Yoruba</label>
                <label class="subject-item"><input type="checkbox" value="Music"> Music</label>
                <label class="subject-item"><input type="checkbox" value="Visual Arts"> Visual/Fine Arts</label>
                <label class="subject-item"><input type="checkbox" value="Computer Studies"> Computer Studies</label>
                <label class="subject-item"><input type="checkbox" value="Physical and Health Education"> Physical & Health Ed.</label>
            </div>

            <div class="config-area">
                <div class="config-col-left">
                    <div class="subject-accordion-header">
                        <div><i class="fas fa-chevron-down me-2"></i> Configuration</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Number of questions per subject</label>
                        <select class="form-select" id="questionCountSelect">
                            <option value="10">10 Questions</option>
                            <option value="20">20 Questions</option>
                            <option value="40" selected>40 Questions</option>
                        </select>
                    </div>
                </div>

                <div class="config-col-center">
                    <div class="utme-avatar"><i class="fas fa-user"></i></div>
                    <input type="text" class="form-control text-center fw-bold fs-5 rounded-pill mb-2" id="displayStudentName" readonly value="Loading...">
                    <button class="btn-start" onclick="startSimulator()"><i class="fas fa-play-circle me-2"></i> Get Started</button>
                </div>

                <div class="config-col-right">
                    <div class="fieldset-box mt-3">
                        <span class="fieldset-legend">Total Time</span>
                        <select class="form-select border-0 bg-transparent fw-bold" style="padding: 0;">
                            <option>02:00:00</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleTheme = () => {
            const body = document.body; body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('SPRINGDRILL_THEME', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
        };
        if (localStorage.getItem('SPRINGDRILL_THEME') === 'dark') { window.toggleTheme(); }

        async function init() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return window.location.href = 'login.html';
                const { data: profile } = await supabase.from('users').select('name').eq('id', session.user.id).single();
                if(profile) document.getElementById('displayStudentName').value = profile.name;
                document.getElementById('loadingOverlay').style.display = 'none';
            } catch (err) { console.error(err); }
        }

        window.startSimulator = () => {
            const checkboxes = document.querySelectorAll('.subject-grid input[type="checkbox"]:checked');
            const selectedSubjects = Array.from(checkboxes).map(cb => cb.value);
            const questionCount = document.getElementById('questionCountSelect').value;

            if (selectedSubjects.length === 0) return alert("Select at least one subject.");
            if (selectedSubjects.length > 4) return alert("JAMB allows a maximum of 4 subjects.");

            localStorage.setItem('UTME_SUBJECTS', JSON.stringify(selectedSubjects));
            localStorage.setItem('UTME_QUESTION_COUNT', questionCount); // Saving the dynamic count
            window.location.href = 'student_utme_exam.html';
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
