<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - UTME Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; --utme-green: #007a4d;}
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; box-shadow: 4px 0 15px rgba(0,0,0,0.1); transition: left 0.3s ease;}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; transition: margin-left 0.3s ease;}
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }

        .result-card { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 30px;}
        
        .result-header { background: linear-gradient(135deg, #007a4d 0%, #004d34 100%); color: white; padding: 40px 20px; text-align: center; position: relative;}
        .score-circle { width: 150px; height: 150px; background: white; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 15px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 5px solid #f1c40f;}
        .score-value { font-size: 3rem; font-weight: 900; color: #007a4d; line-height: 1;}
        .score-total { font-size: 1rem; color: #6c757d; font-weight: bold;}

        .breakdown-section { padding: 30px; }
        .subject-bar-container { margin-bottom: 20px; }
        .subject-name { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; color: var(--text-color);}
        .progress { height: 12px; background-color: var(--input-bg); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);}
        .progress-bar { background-color: var(--utme-green); font-weight: bold; font-size: 0.7rem; line-height: 12px;}

        .action-buttons { display: flex; gap: 15px; justify-content: center; padding: 20px 30px 30px 30px; background: var(--card-bg); border-top: 1px solid var(--border-color);}
        
        .mobile-menu-toggle { display: none; background: none; border: none; color: var(--utme-green); font-size: 1.8rem; cursor: pointer;}
        .sidebar-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1040; display: none; }

        @media (max-width: 992px) {
            .sidebar { left: -260px; }
            .sidebar.mobile-open { left: 0; }
            .main-content { margin-left: 0; padding: 15px; }
            .mobile-menu-toggle { display: inline-block; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex justify-content-between align-items-center px-3">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
            <button class="btn btn-sm text-white d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times fs-4"></i></button>
        </div>
        <nav class="nav flex-column mt-3">
            <a href="student_dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="student_utme.html" class="nav-link"><i class="fas fa-robot"></i> AI JAMB Simulator</a>
            <a href="student_utme_hub.html" class="nav-link active fw-bold text-warning"><i class="fas fa-university"></i> Real UTME Hub</a>
            <a href="student_results.html" class="nav-link"><i class="fas fa-chart-line"></i> My Results</a>
            <a href="student_messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Secure Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar border-start border-4 border-warning">
            <div class="d-flex align-items-center">
                <button class="mobile-menu-toggle me-3" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="fw-bold text-muted"><i class="fas fa-flag-checkered me-2"></i> Examination Results</div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-10">
                <div class="result-card">
                    <div class="result-header">
                        <h4 class="fw-bold mb-4">UTME Performance Report</h4>
                        <div class="score-circle">
                            <div class="score-value" id="finalScoreDisplay">0</div>
                            <div class="score-total">out of 400</div>
                        </div>
                        <h5 class="fw-bold m-0 mt-3" id="studentNameDisplay">Loading Student...</h5>
                        <p class="text-light opacity-75 mb-0 mt-1" id="examModeDisplay">Mode: Practice | Year: 2024</p>
                    </div>

                    <div class="breakdown-section">
                        <h5 class="fw-bold border-bottom pb-2 mb-4 color-text"><i class="fas fa-chart-bar me-2 text-warning"></i> Subject Breakdown</h5>
                        <div id="breakdownContainer">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin me-2"></i> Analyzing scores...</div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-outline-success fw-bold px-4 py-2" onclick="window.location.href='student_utme_hub.html'">
                            <i class="fas fa-redo me-2"></i> Take Another Test
                        </button>
                        <button class="btn btn-success fw-bold px-5 py-2 shadow" onclick="window.location.href='student_dashboard.html'">
                            <i class="fas fa-home me-2"></i> Return to Dashboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('mobile-open');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        };

        async function processResults() {
            // 1. Authenticate user
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';

            // 2. Fetch User Name
            try {
                const { data: profile } = await supabase.from('users').select('name').eq('id', session.user.id).single();
                if (profile) document.getElementById('studentNameDisplay').innerText = profile.name.toUpperCase();
            } catch(e) { console.error(e); }

            // 3. Retrieve Score Data from the Test Engine
            const resultDataRaw = sessionStorage.getItem('UTME_FINAL_RESULTS');
            if (!resultDataRaw) {
                alert("No recent test data found. Redirecting to hub.");
                return window.location.href = 'student_utme_hub.html';
            }

            const results = JSON.parse(resultDataRaw);
            
            document.getElementById('examModeDisplay').innerText = `Mode: ${results.mode.toUpperCase()} | Year: ${results.year}`;

            // 4. Calculate Scaled JAMB Score (Out of 400)
            let rawTotalScore = results.score;
            let rawTotalQuestions = results.total;
            let jambScaledScore = 0;

            if (rawTotalQuestions > 0) {
                // Formula: (Correct Answers / Total Questions Attempted) * 400
                jambScaledScore = Math.round((rawTotalScore / rawTotalQuestions) * 400);
            }
            
            // Animate Score
            animateValue("finalScoreDisplay", 0, jambScaledScore, 1500);

            // 5. Render Subject Breakdown
            const breakdownHtml = Object.entries(results.breakdown).map(([subject, data]) => {
                const percent = data.total > 0 ? Math.round((data.score / data.total) * 100) : 0;
                
                // Color coding based on performance
                let barColor = "bg-danger";
                if (percent >= 70) barColor = "bg-success";
                else if (percent >= 50) barColor = "bg-warning";

                return `
                <div class="subject-bar-container">
                    <div class="subject-name">
                        <span>${subject}</span>
                        <span class="text-muted">${data.score} / ${data.total} (${percent}%)</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar ${barColor}" role="progressbar" style="width: ${percent}%" aria-valuenow="${percent}" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('breakdownContainer').innerHTML = breakdownHtml;

            // 6. Save Score to Database (so it shows in their charts later!)
            try {
                await supabase.from('test_results').insert([{
                    student_id: session.user.id,
                    test_id: 998, // 998 marks it as a "Real UTME Hub" exam in the DB
                    score: jambScaledScore,
                    total_score: 400,
                    created_at: new Date().toISOString()
                }]);
            } catch(e) {
                console.error("Could not save to database silently.", e);
            }

            // Clear session storage so they can't refresh and double-save
            sessionStorage.removeItem('UTME_FINAL_RESULTS');
        }

        // Cool counter animation for the big score
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        document.addEventListener('DOMContentLoaded', processResults);
        document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
