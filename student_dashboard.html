<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* GLOBAL DARK MODE ENGINE */
        :root { 
            --bg-color: #f4f7fa; 
            --card-bg: #ffffff; 
            --text-color: #333333; 
            --text-muted: #6c757d; 
            --border-color: #e9ecef; 
            --input-bg: #f8f9fa; 
        }
        body.dark-mode { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #e0e0e0; 
            --text-muted: #a0a0a0; 
            --border-color: #333333; 
            --input-bg: #2c2c2c; 
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 20px; z-index: 1050; transition: transform 0.3s ease; }
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; transition: all 0.3s; font-size: 0.95rem; display: flex; align-items: center; }
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; transition: margin-left 0.3s ease; }
        
        /* Top Navbar */
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-left: 5px solid #007a4d; transition: all 0.3s; }
        .dark-toggle-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .dark-toggle-btn:hover { transform: scale(1.1); }

        /* Student Profile Card */
        .profile-section { display: flex; align-items: center; gap: 30px; padding: 25px; background: var(--card-bg); border-radius: 8px; border-top: 4px solid #007a4d; box-shadow: 0 2px 5px rgba(0,0,0,0.02); margin-bottom: 30px; transition: all 0.3s;}
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid var(--bg-color); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .profile-info h3 { font-weight: 800; color: var(--text-color); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .profile-info p { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

        /* Icon Grid */
        .icon-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;}
        .icon-card { background: var(--card-bg); width: 140px; padding: 25px 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); cursor: pointer; transition: all 0.3s; text-decoration: none; color: var(--text-color); border: 1px solid var(--border-color); position: relative;}
        .icon-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); border-color: #007a4d; }
        .icon-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-size: 2rem; color: white; }
        
        .ic-subjects { background: #3498db; }
        .ic-assignments { background: #f39c12; }
        .ic-cbt { background: #e74c3c; }
        .ic-eclassroom { background: #34495e; }
        .ic-results { background: #2ecc71; }
        .ic-mail { background: #9b59b6; }

        .icon-card h6 { font-weight: 600; font-size: 0.9rem; color: inherit; margin: 0; }
        .notification-badge { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 50%; display: none; border: 2px solid var(--card-bg);}

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; }

        /* MOBILE OPTIMIZATION */
        .mobile-menu-toggle { display: none; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; margin-right: 15px; }
        .sidebar-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1040; display: none; }
        
        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); box-shadow: 2px 0 15px rgba(0,0,0,0.3); }
            .main-content { margin-left: 0; padding: 15px; }
            .mobile-menu-toggle { display: inline-block; }
            .top-navbar { padding: 15px; flex-direction: column; gap: 10px; }
            .profile-section { flex-direction: column; text-align: center; }
            .icon-grid { gap: 15px; }
            .icon-card { width: calc(50% - 10px); }
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-3x text-success mb-3"></i>
        <h4 class="fw-bold" style="color: var(--text-muted);">Loading Portal...</h4>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex justify-content-between align-items-center px-3">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
            <button class="btn btn-sm btn-link text-white d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="nav flex-column mt-3">
            <a href="student_dashboard.html" class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
            <a href="student_eclassroom.html" class="nav-link"><i class="fas fa-play"></i> eClassroom</a>
            <a href="student_subjects.html" class="nav-link"><i class="fas fa-book"></i> My Subjects</a>
            <a href="student_cbt.html" class="nav-link"><i class="fas fa-laptop-code"></i> CBT / Exams</a>
            <a href="student_results.html" class="nav-link"><i class="fas fa-award"></i> Result Manager</a>
            <a href="student_messages.html" class="nav-link mt-2"><i class="fas fa-envelope"></i> My Inbox <span class="badge bg-danger ms-auto" id="sidebarBadge" style="display: none;">0</span></a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-warning mt-auto"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="mobile-menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="fw-bold d-none d-md-block" style="color: var(--text-muted);"><i class="fas fa-user-graduate me-2"></i> Student Portal</div>
            </div>

            <div class="header-profile-section mt-lg-0">
                <div class="d-flex align-items-center ms-auto">
                    <button class="dark-toggle-btn me-3" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Dark Mode">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </button>
                    <div class="fw-bold d-flex align-items-center" style="color: var(--text-color);">
                        <span id="headerName">Loading...</span><i class="fas fa-bell text-success ms-3"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-section">
            <img src="https://ui-avatars.com/api/?name=Student&background=007a4d&color=fff" id="profileImage" class="profile-img">
            <div class="profile-info">
                <h3 id="studentName">LOADING...</h3>
                <p id="studentClass">Class: Verifying...</p>
            </div>
        </div>

        <div class="icon-grid">
            <a href="student_messages.html" class="icon-card">
                <div class="notification-badge" id="cardBadge">0</div>
                <div class="icon-circle ic-mail"><i class="fas fa-envelope"></i></div>
                <h6>My Inbox</h6>
            </a>

            <a href="student_subjects.html" class="icon-card">
                <div class="icon-circle ic-subjects"><i class="fas fa-book"></i></div>
                <h6>Subjects</h6>
            </a>

            <a href="student_eclassroom.html" class="icon-card">
                <div class="icon-circle ic-eclassroom"><i class="fas fa-video"></i></div>
                <h6>eClassroom</h6>
            </a>

            <a href="student_cbt.html" class="icon-card" style="border: 2px solid #e74c3c;">
                <div class="icon-circle ic-cbt"><i class="fas fa-laptop-code"></i></div>
                <h6>CBT / Exams</h6>
            </a>

            <a href="student_results.html" class="icon-card">
                <div class="icon-circle ic-results"><i class="fas fa-award"></i></div>
                <h6>Results</h6>
            </a>

            <a href="my_profile.html" class="icon-card">
                <div class="icon-circle ic-assignments" style="background: #3498db;"><i class="fas fa-user-circle"></i></div>
                <h6>My Profile</h6>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        // === UI TOGGLES ===
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('mobile-open');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        };

        window.toggleTheme = () => {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('SPRINGDRILL_THEME', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
        };

        if (localStorage.getItem('SPRINGDRILL_THEME') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').className = 'fas fa-sun text-warning';
        }

        window.addEventListener('storage', (event) => {
            if (event.key === 'SPRINGDRILL_THEME') {
                const isDark = event.newValue === 'dark';
                isDark ? document.body.classList.add('dark-mode') : document.body.classList.remove('dark-mode');
                document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
            }
        });

        // === LOGIC ===
        async function initializeDashboard() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return window.location.href = 'login.html';
                const userId = session.user.id;

                let displayName = "Student";
                let className = "Unassigned";
                let avatarUrl = `https://ui-avatars.com/api/?name=Student&background=007a4d&color=fff`;

                // 1. Fetch Profile Data
                const { data: studentRecords } = await supabase
                    .from('students')
                    .select('surname, first_name, passport_url, classes(name)')
                    .eq('user_id', userId);

                if (studentRecords && studentRecords.length > 0) {
                    const student = studentRecords[0];
                    if (student.first_name) {
                        displayName = `${student.first_name} ${student.surname || ''}`;
                        avatarUrl = student.passport_url || `https://ui-avatars.com/api/?name=${student.first_name}+${student.surname}&background=007a4d&color=fff`;
                    }
                    if (student.classes) className = student.classes.name;
                }

                document.getElementById('headerName').innerText = displayName;
                document.getElementById('studentName').innerText = displayName;
                document.getElementById('studentClass').innerText = `Class: ${className}`;
                document.getElementById('profileImage').src = avatarUrl;

                // 2. Check for Unread Messages
                const { count: unreadCount, error: msgErr } = await supabase
                    .from('messages')
                    .select('*', { count: 'exact', head: true })
                    .eq('receiver_id', userId)
                    .eq('is_read', false);

                if (!msgErr && unreadCount > 0) {
                    const sidebarBadge = document.getElementById('sidebarBadge');
                    sidebarBadge.innerText = unreadCount;
                    sidebarBadge.style.display = 'inline-block';

                    const cardBadge = document.getElementById('cardBadge');
                    cardBadge.innerText = unreadCount;
                    cardBadge.style.display = 'inline-block';
                }

                document.getElementById('loadingOverlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', initializeDashboard);

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
