<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; --utme-green: #007a4d;}
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; box-shadow: 4px 0 15px rgba(0,0,0,0.1);}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; }
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--utme-green); }
        .dark-toggle-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;}

        .control-panel { background: var(--card-bg); border-radius: 10px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        
        .roster-card { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .roster-header { background: var(--utme-green); color: white; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .custom-table { width: 100%; margin: 0; color: var(--text-color); }
        .custom-table th { padding: 15px 20px; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border-color); background: var(--input-bg);}
        .custom-table td { padding: 15px 20px; vertical-align: middle; border-bottom: 1px solid var(--border-color); }
        .custom-table tr:hover { background-color: rgba(0,0,0,0.02); }

        /* STATUS BUTTONS */
        .status-group { display: flex; gap: 8px; justify-content: center; }
        .status-btn { padding: 6px 15px; font-size: 0.85rem; font-weight: bold; border-radius: 6px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        
        .status-btn.present:hover { border-color: #27ae60; color: #27ae60; }
        .status-btn.present.active { background: rgba(39, 174, 96, 0.15); color: #27ae60; border-color: #27ae60; }
        
        .status-btn.absent:hover { border-color: #e74c3c; color: #e74c3c; }
        .status-btn.absent.active { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border-color: #e74c3c; }
        
        .status-btn.late:hover { border-color: #f39c12; color: #f39c12; }
        .status-btn.late.active { background: rgba(241, 196, 15, 0.15); color: #f39c12; border-color: #f39c12; }

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-3x text-success mb-3"></i>
        <h4 class="fw-bold" style="color: var(--text-muted);">Authenticating...</h4>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-chalkboard-teacher text-warning me-2"></i> STAFF PORTAL</h5>
        </div>
        
        <nav class="nav flex-column mt-3">
            <a href="teacher_dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="teacher_class_list.html" class="nav-link"><i class="fas fa-users"></i> Class Roster & 360°</a>
            <a href="teacher_attendance.html" class="nav-link active"><i class="fas fa-calendar-check text-warning"></i> Attendance Tracker</a>
            <a href="teacher_eclassroom.html" class="nav-link"><i class="fas fa-video text-danger"></i> eClassroom</a>
            <a href="teacher_subjects.html" class="nav-link"><i class="fas fa-book"></i> Materials & AI Planner</a>

            <a href="#cbtMenu" data-bs-toggle="collapse" class="nav-link d-flex justify-content-between align-items-center mt-2 bg-success text-white">
                <span><i class="fas fa-laptop-code me-2"></i> CBT Console</span><i class="fas fa-caret-down"></i>
            </a>
            <div class="collapse bg-dark mx-2 mt-1 rounded" id="cbtMenu">
                <a href="create_test.html" class="nav-link small py-2"><i class="fas fa-plus-circle me-2"></i> Create Exam</a>
                <a href="question_bank.html" class="nav-link small py-2"><i class="fas fa-database me-2"></i> Question Bank</a>
                <a href="manage_cbt.html" class="nav-link small py-2"><i class="fas fa-list me-2"></i> Manage Exams</a>
                <a href="test_results.html" class="nav-link small py-2"><i class="fas fa-chart-bar me-2"></i> Result Manager</a>
            </div>

            <a href="teacher_messages.html" class="nav-link mt-2"><i class="fas fa-envelope"></i> Communications</a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Secure Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="fw-bold d-none d-md-block" style="color: var(--text-muted);"><i class="fas fa-calendar-check me-2"></i> Daily Attendance Tracker</div>
            <button class="dark-toggle-btn me-3" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>

        <div class="control-panel">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-bold text-muted small">Select Class Roster</label>
                    <select id="classSelect" class="form-select form-select-lg fw-bold">
                        <option value="">-- Choose a Class --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-muted small">Attendance Date</label>
                    <input type="date" id="dateSelect" class="form-control form-control-lg fw-bold">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success btn-lg w-100 fw-bold" onclick="loadRoster()"><i class="fas fa-list-ul me-2"></i> Load Roster</button>
                </div>
            </div>
        </div>

        <div class="roster-card" id="rosterSection" style="display: none;">
            <div class="roster-header">
                <span><i class="fas fa-clipboard-list me-2"></i> Mark Register</span>
                <span class="badge bg-light text-dark" id="displayDateBadge">Date</span>
            </div>
            
            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th width="10%" class="text-center">S/N</th>
                            <th width="35%">Student Name</th>
                            <th width="25%">Reg Number</th>
                            <th width="30%" class="text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="rosterBody">
                        </tbody>
                </table>
            </div>
            
            <div class="p-4 bg-light border-top d-flex justify-content-end">
                <button class="btn btn-primary btn-lg fw-bold shadow-sm px-5" id="saveBtn" onclick="saveAttendance()">
                    <i class="fas fa-save me-2"></i> Save Daily Attendance
                </button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleTheme = () => {
            const body = document.body; body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('SPRINGDRILL_THEME', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
        };
        if (localStorage.getItem('SPRINGDRILL_THEME') === 'dark') { window.toggleTheme(); }

        let currentClassId = '';
        let currentDate = '';
        let rosterData = [];
        let attendanceState = {}; // Object matching student UUIDs to their current status

        async function initialize() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return window.location.href = 'login.html';

                // Load Teacher's Classes
                const { data: classes } = await supabase.from('classes').select('id, name').order('name');
                if (classes) {
                    const sel = document.getElementById('classSelect');
                    classes.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
                }

                // Set Date default
                const today = new Date();
                const y = today.getFullYear();
                const m = String(today.getMonth() + 1).padStart(2, '0');
                const d = String(today.getDate()).padStart(2, '0');
                document.getElementById('dateSelect').value = `${y}-${m}-${d}`;

                document.getElementById('loadingOverlay').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        window.loadRoster = async () => {
            currentClassId = document.getElementById('classSelect').value;
            currentDate = document.getElementById('dateSelect').value;

            if (!currentClassId) return alert("Please select a class first.");
            if (!currentDate) return alert("Please select a date.");

            document.getElementById('rosterSection').style.display = 'block';
            document.getElementById('displayDateBadge').innerText = new Date(currentDate).toDateString();
            document.getElementById('rosterBody').innerHTML = '<tr><td colspan="4" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-success"></i></td></tr>';

            try {
                // Fetch Students
                const { data: students, error } = await supabase.from('students').select('*').eq('class_id', currentClassId).eq('approved', true).order('first_name');
                if (error) throw error;

                if (!students || students.length === 0) {
                    document.getElementById('rosterBody').innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted">No students found in this class.</td></tr>';
                    return;
                }

                rosterData = students;
                attendanceState = {};
                
                // Set default state to 'Present'
                students.forEach(s => attendanceState[s.id] = 'Present');

                renderTable();

            } catch (err) {
                document.getElementById('rosterBody').innerHTML = `<tr><td colspan="4" class="text-center py-5 text-danger">Error: ${err.message}</td></tr>`;
            }
        };

        function renderTable() {
            const tbody = document.getElementById('rosterBody');
            tbody.innerHTML = rosterData.map((s, index) => {
                const state = attendanceState[s.id];
                return `
                    <tr>
                        <td class="text-center fw-bold text-muted">${index + 1}</td>
                        <td class="fw-bold" style="color: var(--text-color);">${s.first_name} ${s.surname || ''}</td>
                        <td class="fw-bold text-primary">${s.reg_number || 'N/A'}</td>
                        <td>
                            <div class="status-group">
                                <button class="status-btn present ${state === 'Present' ? 'active' : ''}" onclick="setStatus('${s.id}', 'Present')">Present</button>
                                <button class="status-btn absent ${state === 'Absent' ? 'active' : ''}" onclick="setStatus('${s.id}', 'Absent')">Absent</button>
                                <button class="status-btn late ${state === 'Late' ? 'active' : ''}" onclick="setStatus('${s.id}', 'Late')">Late</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.setStatus = (studentId, status) => {
            attendanceState[studentId] = status;
            renderTable(); // Re-render to update colors instantly
        };

        // 🚨 BULLETPROOF SAVE FUNCTION 🚨
        window.saveAttendance = async () => {
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Saving to Database...';
            btn.disabled = true;

            try {
                // Step 1: Wipe previous entries for this exact class and date to prevent duplicate records
                await supabase.from('attendance')
                    .delete()
                    .eq('class_id', currentClassId)
                    .eq('date', currentDate);

                // Step 2: Build the payload perfectly matching our database columns
                const payload = rosterData.map(s => ({
                    student_id: s.id,
                    class_id: currentClassId,
                    date: currentDate,
                    status: attendanceState[s.id]
                }));

                // Step 3: Insert and STRICTLY check for errors
                const { error } = await supabase.from('attendance').insert(payload);

                if (error) {
                    // THIS IS WHAT WAS MISSING: If Supabase rejects it, THROW AN ERROR!
                    throw new Error(error.message);
                }

                alert(`Success!\nAttendance for ${payload.length} students has been saved securely to the database.`);

            } catch (err) {
                console.error("Database Save Error:", err);
                alert(`🚨 DATABASE REJECTED THE SAVE 🚨\n\nReason: ${err.message}\n\nPlease screenshot this error for the developer.`);
            }

            btn.innerHTML = '<i class="fas fa-save me-2"></i> Save Daily Attendance';
            btn.disabled = false;
        };

        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
