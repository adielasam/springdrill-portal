<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - Attendance Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f7fa; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; --utme-green: #007a4d;}
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; box-shadow: 4px 0 15px rgba(0,0,0,0.1);}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; text-decoration: none; display: flex; align-items: center;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; }
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--utme-green); }
        .dark-toggle-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;}

        .control-panel { background: var(--card-bg); border-radius: 10px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .form-control, .form-select { background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); }
        
        .table-wrapper { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; }
        .custom-table { width: 100%; margin: 0; color: var(--text-color); }
        .custom-table th { background: var(--input-bg); padding: 15px 20px; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border-color); font-weight: 700;}
        .custom-table td { padding: 15px 20px; vertical-align: middle; border-bottom: 1px solid var(--border-color); }
        
        .badge-present { background-color: rgba(39, 174, 96, 0.15); color: #27ae60; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(39, 174, 96, 0.3);}
        .badge-absent { background-color: rgba(231, 76, 60, 0.15); color: #e74c3c; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(231, 76, 60, 0.3);}
        .badge-late { background-color: rgba(241, 196, 15, 0.15); color: #f39c12; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(241, 196, 15, 0.3);}

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-3x text-success mb-3"></i>
        <h4 class="fw-bold" style="color: var(--text-muted);">Syncing Data...</h4>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
        </div>
        
        <nav class="nav flex-column mt-3">
            <a href="admin_dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="admin_attendance.html" class="nav-link active fw-bold"><i class="fas fa-calendar-check text-warning me-2"></i> Attendance Log</a>
            <a href="#usersMenu" data-bs-toggle="collapse" class="nav-link d-flex justify-content-between align-items-center mt-2 bg-success text-white">
                <span><i class="fas fa-users me-2"></i> Accounts</span><i class="fas fa-caret-down"></i>
            </a>
            <div class="collapse show bg-dark mx-2 mt-1 rounded" id="usersMenu">
                <a href="admin_create_user.html" class="nav-link small py-2"><i class="fas fa-user-plus me-2"></i> Generate Account</a>
                <a href="manage_users.html" class="nav-link small py-2"><i class="fas fa-user-check me-2"></i> Approvals</a>
                <a href="class_list.html" class="nav-link small py-2"><i class="fas fa-clipboard-list me-2"></i> Class Data</a>
            </div>
            <a href="admin_league_table.html" class="nav-link mt-2"><i class="fas fa-trophy text-warning me-2"></i> League Table</a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Secure Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="fw-bold d-none d-md-block" style="color: var(--text-muted);"><i class="fas fa-calendar-alt me-2"></i> Master Attendance Log</div>
            <button class="dark-toggle-btn me-3" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Student Attendance Records</h3>
        </div>

        <div class="control-panel">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold text-muted small">Select Date</label>
                    <input type="date" id="dateFilter" class="form-control form-control-lg fw-bold" onchange="loadAttendance()">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-lg w-100 fw-bold" onclick="clearDateFilter()" title="Show All Records"><i class="fas fa-history me-1"></i> All Time</button>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-muted small">Filter by Class</label>
                    <select id="classFilter" class="form-select form-select-lg fw-bold" onchange="loadAttendance()">
                        <option value="all">All Classes Overview</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success btn-lg w-100 fw-bold" onclick="loadAttendance()"><i class="fas fa-sync-alt me-2"></i> Refresh</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper table-responsive mb-5">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th width="35%">Student Name</th>
                        <th width="20%">Class / Reg No.</th>
                        <th width="25%">Time Logged</th>
                        <th width="20%" class="text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        window.toggleTheme = () => {
            const body = document.body; body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('SPRINGDRILL_THEME', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
        };
        if (localStorage.getItem('SPRINGDRILL_THEME') === 'dark') { window.toggleTheme(); }

        window.clearDateFilter = () => {
            document.getElementById('dateFilter').value = ""; // Erases the date entirely to show EVERYTHING
            window.loadAttendance();
        };

        async function initialize() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return window.location.href = 'login.html';

                const { data: classes } = await supabase.from('classes').select('*').order('name');
                if (classes) {
                    const classSelect = document.getElementById('classFilter');
                    classes.forEach(c => { classSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
                }

                // Default to today
                const today = new Date();
                const y = today.getFullYear();
                const m = String(today.getMonth() + 1).padStart(2, '0');
                const d = String(today.getDate()).padStart(2, '0');
                document.getElementById('dateFilter').value = `${y}-${m}-${d}`;
                
                await loadAttendance();
                document.getElementById('loadingOverlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        window.loadAttendance = async () => {
            const tbody = document.getElementById('attendanceTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted"><i class="fas fa-spinner fa-spin fa-2x mb-2"></i><br>Fetching records...</td></tr>';

            const selectedDate = document.getElementById('dateFilter').value; 
            const selectedClass = document.getElementById('classFilter').value;

            try {
                const [rawAtt, allStudents, allClasses] = await Promise.all([
                    supabase.from('attendance').select('*').order('created_at', { ascending: false }),
                    supabase.from('students').select('*'),
                    supabase.from('classes').select('*')
                ]);

                // 🚨 DIAGNOSTIC CHECK: Is the database actually empty?
                if (rawAtt.error || !rawAtt.data || rawAtt.data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-danger fw-bold"><i class="fas fa-database fs-1 mb-3 opacity-50"></i><br>0 records found in database.<br><small class="text-muted">If the teacher saved it, it failed silently on the teacher's screen.</small></td></tr>`;
                    return;
                }

                const classMap = {};
                if (allClasses.data) allClasses.data.forEach(c => classMap[c.id] = c.name);

                const studentMap = {};
                if (allStudents.data) {
                    allStudents.data.forEach(s => {
                        s.className = classMap[s.class_id] || 'Unassigned';
                        if (s.id) studentMap[String(s.id).trim().toLowerCase()] = s;
                        if (s.user_id) studentMap[String(s.user_id).trim().toLowerCase()] = s;
                        if (s.reg_number) studentMap[String(s.reg_number).trim().toLowerCase()] = s; 
                    });
                }

                const filteredRecords = rawAtt.data.filter(record => {
                    const rawId = record.student_id || record.user_id || record.studentId || record.reg_number || "";
                    const cleanId = String(rawId).trim().toLowerCase();
                    const studentObj = studentMap[cleanId];

                    // Safely extract the date
                    const dbDateString = record.created_at ? record.created_at.split('T')[0] : (record.date ? record.date.split('T')[0] : "");
                    
                    // If selectedDate is empty (All Time button clicked), dateMatch is automatically true!
                    const dateMatch = !selectedDate || (dbDateString === selectedDate);
                    
                    // Match Class safely
                    const recClassId = record.class_id || record.className || (studentObj ? studentObj.class_id : null);
                    const selectedClassName = classMap[selectedClass]; 
                    const classMatch = (selectedClass === 'all') || (recClassId == selectedClass) || (recClassId == selectedClassName);

                    record.studentObj = studentObj;
                    record.cleanId = rawId; 
                    record.displayDate = dbDateString;
                    
                    return dateMatch && classMatch;
                });

                if (filteredRecords.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted"><i class="fas fa-calendar-times fs-1 mb-3 opacity-25"></i><br>No attendance records found for this specific date/class.<br><small>Click the <b>"All Time"</b> button to see everything.</small></td></tr>';
                    return;
                }

                tbody.innerHTML = filteredRecords.map(record => {
                    const stat = String(record.status).toLowerCase();
                    let badge = '';
                    if (stat.includes('present')) badge = `<span class="badge-present"><i class="fas fa-check me-2"></i>Present</span>`;
                    else if (stat.includes('late')) badge = `<span class="badge-late"><i class="fas fa-clock me-2"></i>Late</span>`;
                    else badge = `<span class="badge-absent"><i class="fas fa-times me-2"></i>Absent</span>`;
                    
                    const studentName = record.studentObj ? `${record.studentObj.first_name} ${record.studentObj.surname || ''}` : `<span class="text-danger fw-bold">Unlinked Student</span>`;
                    const className = record.studentObj ? record.studentObj.className : (classMap[record.class_id] || record.class_id || record.className || `Reg: ${record.cleanId}`);
                    
                    let timeString = record.displayDate;
                    if (record.created_at) timeString += " " + new Date(record.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    return `<tr>
                        <td class="fw-bold"><i class="fas fa-user-circle me-2 text-muted"></i> ${studentName}</td>
                        <td><span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary">${className}</span></td>
                        <td><i class="far fa-clock me-1 text-muted"></i> <small>${timeString}</small></td>
                        <td class="text-center">${badge}</td>
                    </tr>`;
                }).join('');

            } catch (err) {
                console.error("Failed to load attendance:", err);
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-danger fw-bold"><i class="fas fa-exclamation-triangle fs-2 mb-2"></i><br>Data Error: ${err.message}</td></tr>`;
            }
        };

        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
