<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - Attendance Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* GLOBAL DARK MODE ENGINE */
        :root { 
            --bg-color: #f4f7fa; 
            --card-bg: #ffffff; 
            --text-color: #333333; 
            --text-muted: #6c757d; 
            --border-color: #e9ecef; 
            --input-bg: #f8f9fa; 
            --utme-green: #007a4d;
        }
        body.dark-mode { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #e0e0e0; 
            --text-muted: #a0a0a0; 
            --border-color: #333333; 
            --input-bg: #2c2c2c; 
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; transition: 0.3s; }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; transition: transform 0.3s ease; box-shadow: 4px 0 15px rgba(0,0,0,0.1);}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; transition: all 0.3s; display: flex; align-items: center; font-size: 0.95rem; text-decoration: none;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; transition: margin-left 0.3s ease; }
        .top-navbar { background: var(--card-bg); padding: 15px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--utme-green); }
        .dark-toggle-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }

        .control-panel { background: var(--card-bg); border-radius: 10px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .form-control, .form-select { background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); }
        .form-control:focus, .form-select:focus { background-color: var(--card-bg); color: var(--text-color); border-color: var(--utme-green); box-shadow: none;}
        
        /* Table Styles */
        .table-wrapper { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .custom-table { width: 100%; margin: 0; color: var(--text-color); }
        .custom-table th { background: var(--input-bg); padding: 15px 20px; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--border-color); font-weight: 700;}
        .custom-table td { padding: 15px 20px; vertical-align: middle; border-bottom: 1px solid var(--border-color); }
        .custom-table tr:last-child td { border-bottom: none; }
        .custom-table tbody tr { transition: 0.2s; }
        .custom-table tbody tr:hover { background-color: rgba(0, 122, 77, 0.03); }

        .badge-present { background-color: rgba(39, 174, 96, 0.15); color: #27ae60; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(39, 174, 96, 0.3);}
        .badge-absent { background-color: rgba(231, 76, 60, 0.15); color: #e74c3c; padding: 6px 12px; border-radius: 20px; font-weight: bold; border: 1px solid rgba(231, 76, 60, 0.3);}

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: 0.3s; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .mobile-menu-toggle { display: inline-block !important; }
        }
        .mobile-menu-toggle { display: none; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; margin-right: 15px; }
        .sidebar-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1040; display: none; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-spinner fa-spin fa-3x text-success mb-3"></i>
        <h4 class="fw-bold" style="color: var(--text-muted);">Loading Records...</h4>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand d-flex justify-content-between align-items-center px-3">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
            <button class="btn btn-sm btn-link text-white d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="nav flex-column mt-3">
            <a href="admin_dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            
            <a href="admin_attendance.html" class="nav-link active fw-bold"><i class="fas fa-calendar-check text-warning me-2"></i> Attendance Log</a>

            <a href="#usersMenu" data-bs-toggle="collapse" class="nav-link d-flex justify-content-between align-items-center mt-2 bg-success text-white">
                <span><i class="fas fa-users me-2"></i> Accounts</span><i class="fas fa-caret-down"></i>
            </a>
            <div class="collapse show bg-dark mx-2 mt-1 rounded" id="usersMenu">
                <a href="admin_create_user.html" class="nav-link small py-2"><i class="fas fa-user-plus me-2"></i> Generate Account</a>
                <a href="manage_users.html" class="nav-link small py-2"><i class="fas fa-user-check me-2"></i> Approvals</a>
                <a href="class_list.html" class="nav-link small py-2"><i class="fas fa-clipboard-list me-2"></i> Class Data</a>
            </div>

            <a href="admin_league_table.html" class="nav-link mt-2"><i class="fas fa-trophy text-warning me-2"></i> League Table</a>

            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Secure Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="d-flex align-items-center">
                <button class="mobile-menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="fw-bold d-none d-md-block" style="color: var(--text-muted);"><i class="fas fa-calendar-alt me-2"></i> Master Attendance Log</div>
            </div>

            <div class="d-flex align-items-center ms-auto">
                <button class="dark-toggle-btn me-3" onclick="toggleTheme()" title="Toggle Dark Mode">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Student Attendance Records</h3>
        </div>

        <div class="control-panel">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold text-muted small">Select Date</label>
                    <input type="date" id="dateFilter" class="form-control form-control-lg fw-bold" onchange="loadAttendance()">
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold text-muted small">Filter by Class</label>
                    <select id="classFilter" class="form-select form-select-lg fw-bold" onchange="loadAttendance()">
                        <option value="all">All Classes Overview</option>
                        </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success btn-lg w-100 fw-bold" onclick="loadAttendance()"><i class="fas fa-sync-alt me-2"></i> Refresh</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper table-responsive mb-5">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th width="35%">Student Name</th>
                        <th width="20%">Class</th>
                        <th width="25%">Time Logged</th>
                        <th width="20%" class="text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    </tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        // UI Toggles
        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('mobile-open'); document.getElementById('sidebarOverlay').style.display = document.getElementById('sidebarOverlay').style.display === 'block' ? 'none' : 'block'; };
        window.toggleTheme = () => {
            const body = document.body; body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('SPRINGDRILL_THEME', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-warning' : 'fas fa-moon';
        };
        if (localStorage.getItem('SPRINGDRILL_THEME') === 'dark') { window.toggleTheme(); }

        // Core Logic
        async function initialize() {
            try {
                // 1. Verify Admin Session
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) return window.location.href = 'login.html';

                const { data: profile } = await supabase.from('users').select('role').eq('id', session.user.id).single();
                if (!profile || profile.role !== 'admin') {
                    alert("Unauthorized access!");
                    window.location.href = 'login.html';
                    return;
                }

                // 2. Load classes into the dropdown filter
                const { data: classes } = await supabase.from('classes').select('id, name').order('name');
                if (classes) {
                    const classSelect = document.getElementById('classFilter');
                    classes.forEach(c => {
                        classSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                    });
                }

                // 3. Set Date picker to TODAY by default
                document.getElementById('dateFilter').valueAsDate = new Date();

                // 4. Fetch the data
                await loadAttendance();

                document.getElementById('loadingOverlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        window.loadAttendance = async () => {
            const tbody = document.getElementById('attendanceTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted"><i class="fas fa-spinner fa-spin fa-2x mb-2"></i><br>Fetching records...</td></tr>';

            const selectedDate = document.getElementById('dateFilter').value; // Returns YYYY-MM-DD
            const selectedClass = document.getElementById('classFilter').value;

            try {
                // Fetch attendance joined with student and class data
                const { data: attData, error } = await supabase
                    .from('attendance')
                    .select('status, created_at, students(first_name, surname, class_id, classes(name))')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Filter the results in JS based on Date and selected Class
                const filteredRecords = attData.filter(record => {
                    if (!record.students) return false; // Ignore orphans

                    // Format database timestamp to local YYYY-MM-DD for comparison
                    const dbDate = new Date(record.created_at);
                    const dbDateString = dbDate.getFullYear() + '-' + String(dbDate.getMonth() + 1).padStart(2, '0') + '-' + String(dbDate.getDate()).padStart(2, '0');

                    const dateMatch = dbDateString === selectedDate;
                    const classMatch = selectedClass === 'all' || record.students.class_id == selectedClass;

                    return dateMatch && classMatch;
                });

                if (filteredRecords.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-muted"><i class="fas fa-calendar-times fs-1 mb-3 opacity-25"></i><br>No attendance records found for this criteria.</td></tr>';
                    return;
                }

                // Render the table rows
                tbody.innerHTML = filteredRecords.map(record => {
                    const isPresent = String(record.status).toLowerCase().includes('present');
                    const badge = isPresent 
                        ? `<span class="badge-present"><i class="fas fa-check me-2"></i>Present</span>` 
                        : `<span class="badge-absent"><i class="fas fa-times me-2"></i>Absent</span>`;

                    const studentName = `${record.students.first_name} ${record.students.surname || ''}`;
                    const className = record.students.classes?.name || 'Unassigned';
                    
                    // Format time (e.g., 08:30 AM)
                    const timeString = new Date(record.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    return `
                        <tr>
                            <td class="fw-bold"><i class="fas fa-user-circle me-2 text-muted"></i> ${studentName}</td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary">${className}</span></td>
                            <td><i class="far fa-clock me-1 text-muted"></i> ${timeString}</td>
                            <td class="text-center">${badge}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Failed to load attendance:", err);
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5 text-danger fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Error loading records.</td></tr>';
            }
        };

        document.addEventListener('DOMContentLoaded', initialize);
        document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; });
    </script>
</body>
</html>
