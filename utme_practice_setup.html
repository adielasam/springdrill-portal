<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPRINGDRILL - UTME Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #eef2f3; --card-bg: #ffffff; --text-color: #333333; --text-muted: #6c757d; --border-color: #e9ecef; --input-bg: #f8f9fa; --utme-green: #007a4d;}
        body.dark-mode { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --text-muted: #a0a0a0; --border-color: #333333; --input-bg: #2c2c2c; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; transition: 0.3s; 
               background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23007a4d" fill-opacity="0.03"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
        
        .sidebar { width: 260px; position: fixed; top: 0; left: 0; height: 100vh; background: #004d34; color: white; padding-top: 30px; z-index: 1050; box-shadow: 4px 0 15px rgba(0,0,0,0.1);}
        .sidebar-brand { text-align: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 2px 10px; border-radius: 5px; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem;}
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.15); color: white; font-weight: bold; border-left: 4px solid #f1c40f;}

        .main-content { margin-left: 260px; padding: 20px 40px; min-height: 100vh; }
        
        .setup-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .setup-header { background: var(--utme-green); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1rem;}
        .setup-header a { color: white; text-decoration: none; transition: 0.2s;}
        .setup-header a:hover { color: #f1c40f; }
        
        .setup-body { padding: 30px; }
        
        .section-title { font-size: 0.9rem; text-transform: uppercase; font-weight: 800; color: var(--text-muted); margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;}
        
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 30px;}
        .form-check-label { font-weight: 600; color: var(--text-color); cursor: pointer;}
        
        .profile-area { text-align: center; padding: 20px; border-right: 1px solid var(--border-color); height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .profile-icon-large { width: 120px; height: 120px; background: #4ade80; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3);}
        .student-name-box { background: var(--input-bg); border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 6px; font-weight: bold; width: 100%; max-width: 250px; margin-bottom: 20px;}
        .btn-start { background: #3b82f6; color: white; font-weight: bold; font-size: 1.1rem; padding: 12px 30px; border-radius: 30px; border: none; width: 100%; max-width: 250px; transition: 0.3s; box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);}
        .btn-start:hover { background: #2563eb; transform: translateY(-2px); color: white;}

        .control-group { margin-bottom: 20px; }
        .control-group select, .control-group input { background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); font-weight: 600; }
        .mode-desc { font-size: 0.75rem; color: var(--text-muted); background: var(--input-bg); padding: 8px; border-radius: 4px; margin-top: 5px; border: 1px solid var(--border-color);}
        
        .instructions-btn { background: #22c55e; color: white; font-weight: bold; border: none; padding: 10px; border-radius: 6px; width: 100%; transition: 0.3s;}
        .instructions-btn:hover { background: #16a34a; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 15px; }
            .profile-area { border-right: none; border-bottom: 1px solid var(--border-color); padding-bottom: 30px; margin-bottom: 30px;}
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <h5 class="text-white fw-bold m-0"><i class="fas fa-graduation-cap text-warning me-2"></i> SPRINGDRILL</h5>
        </div>
        <nav class="nav flex-column mt-3">
            <a href="student_dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            
            <a href="utme_simulator.html" class="nav-link"><i class="fas fa-robot"></i> AI JAMB Simulator</a>
            
            <a href="student_utme_hub.html" class="nav-link active fw-bold text-warning"><i class="fas fa-university"></i> Real UTME Hub</a>
            <a href="student_results.html" class="nav-link"><i class="fas fa-chart-line"></i> Results & Analytics</a>
            <a href="student_messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            <hr class="mx-3 my-4 border-secondary">
            <a href="#" id="logoutBtn" class="nav-link text-danger mt-auto"><i class="fas fa-power-off"></i> Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="setup-card">
            <div class="setup-header">
                <div><i class="fas fa-rocket me-2"></i> Practice For UTME</div>
                <a href="student_utme_hub.html"><i class="fas fa-home fs-5"></i></a>
            </div>

            <div class="setup-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="section-title m-0">Select One or More Subjects</div>
                    <div class="d-flex align-items-center">
                        <label class="me-2 fw-bold small text-muted">Year:</label>
                        <select id="examYear" class="form-select form-select-sm fw-bold" style="width: 150px; cursor: pointer;">
                            <option value="RANDOM">RANDOM (All Years)</option>
                            <option value="2024">2024 Model</option>
                            <option value="2023">2023 Model</option>
                            <option value="2022">2022 Model</option>
                            <option value="2021">2021 Model</option>
                            <option value="2020">2020 Model</option>
                            <option value="2019">2019 Model</option>
                            <option value="2018">2018 Model</option>
                            <option value="2017">2017 Model</option>
                            <option value="2016">2016 Model</option>
                            <option value="2015">2015 Model</option>
                        </select>
                    </div>
                </div>

                <div class="subject-grid" id="subjectGrid">
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="English Language" id="sub_eng"><label class="form-check-label" for="sub_eng">English Language</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Mathematics" id="sub_mat"><label class="form-check-label" for="sub_mat">Mathematics</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Physics" id="sub_phy"><label class="form-check-label" for="sub_phy">Physics</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Chemistry" id="sub_che"><label class="form-check-label" for="sub_che">Chemistry</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Biology" id="sub_bio"><label class="form-check-label" for="sub_bio">Biology</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Economics" id="sub_eco"><label class="form-check-label" for="sub_eco">Economics</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Commerce" id="sub_com"><label class="form-check-label" for="sub_com">Commerce</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Accounting" id="sub_acc"><label class="form-check-label" for="sub_acc">Accounting</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Government" id="sub_gov"><label class="form-check-label" for="sub_gov">Government</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Literature" id="sub_lit"><label class="form-check-label" for="sub_lit">Literature</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Geography" id="sub_geo"><label class="form-check-label" for="sub_geo">Geography</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="CRK" id="sub_crk"><label class="form-check-label" for="sub_crk">CRK</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="IRK" id="sub_irk"><label class="form-check-label" for="sub_irk">IRK</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Computer Studies" id="sub_comp"><label class="form-check-label" for="sub_comp">Computer Studies</label></div>
                    <div class="form-check"><input class="form-check-input subject-checkbox" type="checkbox" value="Agriculture" id="sub_agr"><label class="form-check-label" for="sub_agr">Agriculture</label></div>
                </div>

                <div class="row align-items-center">
                    <div class="col-lg-6 profile-area">
                        <div class="profile-icon-large">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="student-name-box text-uppercase" id="displayStudentName">
                            LOADING...
                        </div>
                        <button class="btn-start" onclick="startPractice()">
                            Get Started
                        </button>
                        <button class="btn btn-link text-muted mt-3 fw-bold small" onclick="openTopicFilter()"><i class="fas fa-filter me-1"></i> Select Specific Topics</button>
                    </div>

                    <div class="col-lg-6 ps-lg-5">
                        <div class="control-group">
                            <div class="section-title text-center">Mode</div>
                            <select class="form-select text-center" id="examMode" onchange="updateModeDesc()">
                                <option value="practice">Practice</option>
                                <option value="study">Study</option>
                                <option value="mock">Mock Exam</option>
                            </select>
                            <div class="mode-desc text-center" id="modeDescription">
                                Get timed, view result and get corrections at the end.
                            </div>
                        </div>

                        <div class="control-group">
                            <div class="section-title text-center">Total Time</div>
                            <input type="text" id="examTime" class="form-control text-center" value="02:00:00">
                        </div>

                        <div class="control-group">
                            <div class="section-title text-center">Shuffle</div>
                            <div class="d-flex justify-content-center gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="shuffleQuestions" checked>
                                    <label class="form-check-label small" for="shuffleQuestions">Questions</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="shuffleOptions" checked>
                                    <label class="form-check-label small" for="shuffleOptions">Options</label>
                                </div>
                            </div>
                        </div>

                        <div class="control-group mt-4 pt-3 text-center">
                            <button class="instructions-btn" onclick="alert('UTME INSTRUCTIONS:\n\n1. Select your subjects.\n2. Do not refresh the page during the test.\n3. The test submits automatically when time expires.')">
                                <i class="fas fa-info-circle me-2"></i> Click To View Instructions
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return window.location.href = 'login.html';

            try {
                const { data: profile } = await supabase.from('users').select('name').eq('id', session.user.id).single();
                if (profile) {
                    const firstName = profile.name.split(' ')[0];
                    document.getElementById('displayStudentName').innerText = firstName;
                }
            } catch(e) {
                console.error(e);
            }
        }

        window.updateModeDesc = () => {
            const mode = document.getElementById('examMode').value;
            const desc = document.getElementById('modeDescription');
            if (mode === 'practice') desc.innerText = "Get timed, view result and get corrections at the end.";
            else if (mode === 'study') desc.innerText = "No timer. View correct answers instantly as you practice.";
            else if (mode === 'mock') desc.innerText = "Strict exam conditions. Strict timing, no pausing.";
        };

        window.openTopicFilter = () => {
            alert("Topic filtering will be available soon! For now, exams will cover all topics.");
        };

        window.startPractice = () => {
            const checkboxes = document.querySelectorAll('.subject-checkbox');
            let selectedSubjects = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedSubjects.push(cb.value);
            });

            if (selectedSubjects.length === 0) {
                return alert("Please select at least ONE subject to begin.");
            }
            if (selectedSubjects.length > 4) {
                return alert("JAMB allows a maximum of 4 subjects per sitting. Please deselect some subjects.");
            }

            const config = {
                subjects: selectedSubjects,
                year: document.getElementById('examYear').value,
                mode: document.getElementById('examMode').value,
                time: document.getElementById('examTime').value,
                shuffleQuestions: document.getElementById('shuffleQuestions').checked,
                shuffleOptions: document.getElementById('shuffleOptions').checked,
                isRealUTME: true
            };

            sessionStorage.setItem('UTME_TEST_CONFIG', JSON.stringify(config));
            window.location.href = 'utme_test_engine.html';
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
